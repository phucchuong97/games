<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: "Segoe UI", system-ui, sans-serif;
    gap: 16px;
    padding: 16px;
  }
  h1 { margin: 0; letter-spacing: 2px; color: #4ade80; }
  #scoreboard { display: flex; gap: 32px; font-size: 18px; }
  #scoreboard b { color: #4ade80; }
  #stage { position: relative; }
  canvas {
    background: #16213e;
    border: 2px solid #0f3460;
    border-radius: 8px;
    touch-action: none;
    display: block;
  }
  #message {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(22, 33, 62, 0.88);
    border-radius: 8px;
    text-align: center;
    gap: 16px;
  }
  #message.show { display: flex; }
  #message h2 { margin: 0; color: #4ade80; letter-spacing: 2px; }
  button {
    background: #4ade80;
    color: #16213e;
    border: none;
    padding: 10px 22px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 6px;
    cursor: pointer;
  }
  button:hover { background: #22c55e; }
  #hint { font-size: 13px; color: #94a3b8; }
</style>
</head>
<body>
  <h1>BREAKOUT</h1>
  <div id="scoreboard">
    <span>Score: <b id="score">0</b></span>
    <span>Lives: <b id="lives">3</b></span>
  </div>
  <div id="stage">
    <canvas id="game" width="480" height="420"></canvas>
    <div id="message" class="show">
      <h2 id="message-title">BREAKOUT</h2>
      <button id="action">Start</button>
    </div>
  </div>
  <div id="hint">Move the paddle with your mouse or ← → arrows.</div>

<script>
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const livesEl = document.getElementById("lives");
  const messageEl = document.getElementById("message");
  const messageTitle = document.getElementById("message-title");
  const actionBtn = document.getElementById("action");

  const W = canvas.width, H = canvas.height;
  const PADDLE_W = 80, PADDLE_H = 12;
  const BALL_R = 7;
  const ROWS = 5, COLS = 9;
  const BRICK_H = 18, BRICK_GAP = 4, BRICK_TOP = 40;
  const BRICK_W = (W - BRICK_GAP) / COLS - BRICK_GAP;
  const COLORS = ["#f87171", "#fb923c", "#facc15", "#4ade80", "#60a5fa"];

  let paddleX, ball, bricks, score, lives, running, loopId;

  function init() {
    paddleX = (W - PADDLE_W) / 2;
    score = 0;
    lives = 3;
    scoreEl.textContent = score;
    livesEl.textContent = lives;
    buildBricks();
    resetBall();
    draw();
  }

  function buildBricks() {
    bricks = [];
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        bricks.push({
          x: BRICK_GAP + c * (BRICK_W + BRICK_GAP),
          y: BRICK_TOP + r * (BRICK_H + BRICK_GAP),
          alive: true,
          color: COLORS[r % COLORS.length],
        });
      }
    }
  }

  function resetBall() {
    ball = {
      x: W / 2,
      y: H - 60,
      vx: (Math.random() < 0.5 ? -1 : 1) * 3,
      vy: -3.5,
    };
  }

  function start() {
    running = true;
    messageEl.classList.remove("show");
    clearInterval(loopId);
    loopId = setInterval(tick, 1000 / 60);
  }

  function stop(title, btn) {
    running = false;
    clearInterval(loopId);
    messageTitle.textContent = title;
    actionBtn.textContent = btn;
    messageEl.classList.add("show");
  }

  function tick() {
    ball.x += ball.vx;
    ball.y += ball.vy;

    // wall bounces
    if (ball.x - BALL_R < 0) { ball.x = BALL_R; ball.vx *= -1; }
    if (ball.x + BALL_R > W) { ball.x = W - BALL_R; ball.vx *= -1; }
    if (ball.y - BALL_R < 0) { ball.y = BALL_R; ball.vy *= -1; }

    // paddle bounce
    const py = H - 24;
    if (ball.vy > 0 &&
        ball.y + BALL_R >= py &&
        ball.y + BALL_R <= py + PADDLE_H &&
        ball.x >= paddleX && ball.x <= paddleX + PADDLE_W) {
      ball.vy *= -1;
      ball.y = py - BALL_R;
      // angle depends on where it hits the paddle
      const hit = (ball.x - (paddleX + PADDLE_W / 2)) / (PADDLE_W / 2);
      ball.vx = hit * 4.5;
    }

    // brick collisions
    for (const b of bricks) {
      if (!b.alive) continue;
      if (ball.x + BALL_R > b.x && ball.x - BALL_R < b.x + BRICK_W &&
          ball.y + BALL_R > b.y && ball.y - BALL_R < b.y + BRICK_H) {
        b.alive = false;
        score += 10;
        scoreEl.textContent = score;
        // bounce vertically (simple, good enough)
        ball.vy *= -1;
        break;
      }
    }

    // fell below paddle
    if (ball.y - BALL_R > H) {
      lives--;
      livesEl.textContent = lives;
      if (lives <= 0) { draw(); return stop("Game Over — Score: " + score, "Try Again"); }
      resetBall();
    }

    // cleared all bricks
    if (bricks.every(b => !b.alive)) {
      draw();
      return stop("🎉 You cleared the board! Score: " + score, "Play Again");
    }

    draw();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // bricks
    for (const b of bricks) {
      if (!b.alive) continue;
      ctx.fillStyle = b.color;
      ctx.fillRect(b.x, b.y, BRICK_W, BRICK_H);
    }

    // paddle
    ctx.fillStyle = "#4ade80";
    ctx.fillRect(paddleX, H - 24, PADDLE_W, PADDLE_H);

    // ball
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
    ctx.fillStyle = "#e0e0e0";
    ctx.fill();
  }

  // controls
  canvas.addEventListener("mousemove", e => {
    const rect = canvas.getBoundingClientRect();
    paddleX = clampPaddle(e.clientX - rect.left - PADDLE_W / 2);
    if (!running) draw();
  });
  canvas.addEventListener("touchmove", e => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    paddleX = clampPaddle(e.touches[0].clientX - rect.left - PADDLE_W / 2);
  }, { passive: false });

  let keyDir = 0;
  document.addEventListener("keydown", e => {
    if (e.key === "ArrowLeft") keyDir = -1;
    if (e.key === "ArrowRight") keyDir = 1;
  });
  document.addEventListener("keyup", e => {
    if ((e.key === "ArrowLeft" && keyDir === -1) ||
        (e.key === "ArrowRight" && keyDir === 1)) keyDir = 0;
  });
  // apply keyboard movement inside the loop
  setInterval(() => {
    if (running && keyDir) {
      paddleX = clampPaddle(paddleX + keyDir * 7);
    }
  }, 1000 / 60);

  function clampPaddle(x) {
    return Math.max(0, Math.min(W - PADDLE_W, x));
  }

  actionBtn.addEventListener("click", () => {
    init();
    start();
  });

  init(); // draw the initial scene behind the start overlay
</script>
</body>
</html>
