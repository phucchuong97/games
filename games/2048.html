<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: "Segoe UI", system-ui, sans-serif;
    gap: 16px;
    padding: 16px;
  }
  h1 { margin: 0; letter-spacing: 2px; color: #4ade80; }
  #scoreboard { display: flex; gap: 32px; font-size: 18px; }
  #scoreboard b { color: #4ade80; }
  #stage { position: relative; }
  /* 4×84 tiles + 3×12 gaps + 2×12 padding = 396 */
  #grid {
    position: relative;
    width: 396px;
    height: 396px;
    background: #16213e;
    border: 2px solid #0f3460;
    border-radius: 10px;
    touch-action: none;
  }
  .bg-cell {
    position: absolute;
    width: 84px;
    height: 84px;
    border-radius: 8px;
    background: #0f2a4d;
  }
  .tile {
    position: absolute;
    width: 84px;
    height: 84px;
    /* slide animation */
    transition: transform 110ms ease-in-out;
    will-change: transform;
  }
  .tile-inner {
    width: 100%;
    height: 100%;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: bold;
    background: #eee4da;
    color: #5b5247;
  }
  .tile-inner[data-v="2"]    { background: #eee4da; color: #5b5247; }
  .tile-inner[data-v="4"]    { background: #ede0c8; color: #5b5247; }
  .tile-inner[data-v="8"]    { background: #f2b179; color: #fff; }
  .tile-inner[data-v="16"]   { background: #f59563; color: #fff; }
  .tile-inner[data-v="32"]   { background: #f67c5f; color: #fff; }
  .tile-inner[data-v="64"]   { background: #f65e3b; color: #fff; }
  .tile-inner[data-v="128"]  { background: #edcf72; font-size: 28px; }
  .tile-inner[data-v="256"]  { background: #edcc61; font-size: 28px; }
  .tile-inner[data-v="512"]  { background: #edc850; font-size: 28px; }
  .tile-inner[data-v="1024"] { background: #edc53f; font-size: 22px; color: #fff; }
  .tile-inner[data-v="2048"] { background: #edc22e; font-size: 22px; color: #fff; }
  /* spawn + merge animations live on the inner element so they don't
     clash with the transform-based slide on the outer .tile */
  .tile.new .tile-inner { animation: appear 140ms ease; }
  .tile.merged .tile-inner { animation: pop 160ms ease; }
  @keyframes appear {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  @keyframes pop {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.22); }
    100% { transform: scale(1); }
  }
  #message {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(22, 33, 62, 0.9);
    border-radius: 10px;
    text-align: center;
    gap: 16px;
  }
  #message.show { display: flex; }
  #message h2 { margin: 0; color: #4ade80; letter-spacing: 2px; }
  button {
    background: #4ade80;
    color: #16213e;
    border: none;
    padding: 10px 22px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 6px;
    cursor: pointer;
  }
  button:hover { background: #22c55e; }
  #hint { font-size: 13px; color: #94a3b8; }
</style>
</head>
<body>
  <h1>2048</h1>
  <div id="scoreboard">
    <span>Score: <b id="score">0</b></span>
    <span>Best: <b id="best">0</b></span>
  </div>
  <div id="stage">
    <div id="grid"></div>
    <div id="message" class="show">
      <h2 id="message-title">2048</h2>
      <button id="action">Start</button>
    </div>
  </div>
  <div id="hint">Use arrow keys or WASD (swipe on mobile). Reach 2048!</div>

<script>
  const gridEl = document.getElementById("grid");
  const scoreEl = document.getElementById("score");
  const bestEl = document.getElementById("best");
  const messageEl = document.getElementById("message");
  const messageTitle = document.getElementById("message-title");
  const actionBtn = document.getElementById("action");

  const SIZE = 4;
  const PAD = 12, CELL = 84, GAP = 12, STEP = CELL + GAP; // pixel geometry
  const MOVE_MS = 110;                                    // matches CSS transition
  // move directions
  const VEC = [
    { dr: 0, dc: -1 }, // 0 left
    { dr: -1, dc: 0 }, // 1 up
    { dr: 0, dc: 1 },  // 2 right
    { dr: 1, dc: 0 },  // 3 down
  ];

  let grid;        // SIZE×SIZE of tile objects or null
  let score, best, started, over, won, keepPlaying, animating;

  best = Number(localStorage.getItem("best2048") || 0);
  bestEl.textContent = best;

  // background slots
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const bg = document.createElement("div");
      bg.className = "bg-cell";
      bg.style.left = (PAD + c * STEP) + "px";
      bg.style.top = (PAD + r * STEP) + "px";
      gridEl.appendChild(bg);
    }
  }

  function xy(r, c) {
    return `translate(${PAD + c * STEP}px, ${PAD + r * STEP}px)`;
  }

  function makeTile(r, c, value, isNew) {
    const el = document.createElement("div");
    el.className = "tile" + (isNew ? " new" : "");
    const inner = document.createElement("div");
    inner.className = "tile-inner";
    el.appendChild(inner);
    el.style.transform = xy(r, c);
    gridEl.appendChild(el);
    const tile = { value, el, inner, merged: false };
    setValue(tile, value);
    return tile;
  }

  function setValue(tile, v) {
    tile.value = v;
    tile.inner.textContent = v;
    tile.inner.dataset.v = v;
  }

  function moveTileTo(tile, r, c) {
    tile.el.style.transform = xy(r, c);
  }

  function popMerge(tile) {
    tile.el.classList.remove("merged");
    void tile.el.offsetWidth; // restart the animation
    tile.el.classList.add("merged");
  }

  function init() {
    // clear any existing tile elements
    gridEl.querySelectorAll(".tile").forEach(el => el.remove());
    grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
    score = 0;
    over = false;
    won = false;
    keepPlaying = false;
    animating = false;
    scoreEl.textContent = score;
    spawnRandom();
    spawnRandom();
  }

  function spawnRandom() {
    const empty = [];
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (!grid[r][c]) empty.push({ r, c });
    if (!empty.length) return;
    const { r, c } = empty[Math.floor(Math.random() * empty.length)];
    grid[r][c] = makeTile(r, c, Math.random() < 0.9 ? 2 : 4, true);
  }

  function traversal(dir) {
    let rows = [0, 1, 2, 3], cols = [0, 1, 2, 3];
    if (dir === 2) cols = [3, 2, 1, 0]; // right → start from right edge
    if (dir === 3) rows = [3, 2, 1, 0]; // down → start from bottom
    return { rows, cols };
  }

  const inBounds = (r, c) => r >= 0 && r < SIZE && c >= 0 && c < SIZE;

  function move(dir) {
    if (!started || over || animating) return;

    const vec = VEC[dir];
    const { rows, cols } = traversal(dir);
    // reset per-move merge flags
    for (const row of grid) for (const t of row) if (t) t.merged = false;

    let moved = false;
    const merges = []; // {keep, remove, value}

    for (const r of rows) {
      for (const c of cols) {
        let tile = grid[r][c];
        if (!tile) continue;
        grid[r][c] = null;

        // slide as far as possible
        let nr = r, nc = c;
        while (true) {
          const tr = nr + vec.dr, tc = nc + vec.dc;
          if (!inBounds(tr, tc)) break;
          const occupant = grid[tr][tc];
          if (occupant === null) { nr = tr; nc = tc; continue; }
          if (occupant.value === tile.value && !occupant.merged) {
            // merge into the occupant
            nr = tr; nc = tc;
            occupant.merged = true;
            const newVal = tile.value * 2;
            merges.push({ keep: occupant, remove: tile, value: newVal });
            score += newVal;
            if (newVal === 2048) won = true;
            moveTileTo(tile, nr, nc); // slide onto occupant, removed after anim
            moved = true;
            tile = null;
          }
          break;
        }

        if (tile) {
          grid[nr][nc] = tile;
          if (nr !== r || nc !== c) { moveTileTo(tile, nr, nc); moved = true; }
        }
      }
    }

    if (!moved) return;

    animating = true;
    setTimeout(() => {
      // finalize merges: bump value, pop, drop the absorbed tile
      for (const m of merges) {
        setValue(m.keep, m.value);
        popMerge(m.keep);
        m.remove.el.remove();
      }
      spawnRandom();

      scoreEl.textContent = score;
      if (score > best) {
        best = score;
        bestEl.textContent = best;
        localStorage.setItem("best2048", best);
      }
      animating = false;

      if (won && !keepPlaying) return showMessage("🎉 You reached 2048!", "Keep Going");
      if (isStuck()) return showMessage("Game Over — Score: " + score, "Try Again");
    }, MOVE_MS);
  }

  function isStuck() {
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++) {
        const t = grid[r][c];
        if (!t) return false;
        if (c < SIZE - 1 && grid[r][c + 1] && grid[r][c + 1].value === t.value) return false;
        if (r < SIZE - 1 && grid[r + 1][c] && grid[r + 1][c].value === t.value) return false;
      }
    return true;
  }

  function showMessage(title, btn) {
    over = true;
    started = false;
    messageTitle.textContent = title;
    actionBtn.textContent = btn;
    messageEl.classList.add("show");
  }

  actionBtn.addEventListener("click", () => {
    messageEl.classList.remove("show");
    if (actionBtn.textContent === "Keep Going") {
      keepPlaying = true;
      over = false;
      started = true;
    } else {
      init();
      started = true;
    }
  });

  document.addEventListener("keydown", e => {
    const map = {
      ArrowLeft: 0, a: 0, A: 0,
      ArrowUp: 1, w: 1, W: 1,
      ArrowRight: 2, d: 2, D: 2,
      ArrowDown: 3, s: 3, S: 3,
    };
    if (e.key in map) {
      e.preventDefault();
      move(map[e.key]);
    }
  });

  // swipe support
  let touch = null;
  gridEl.addEventListener("touchstart", e => {
    touch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  });
  gridEl.addEventListener("touchend", e => {
    if (!touch) return;
    const dx = e.changedTouches[0].clientX - touch.x;
    const dy = e.changedTouches[0].clientY - touch.y;
    if (Math.max(Math.abs(dx), Math.abs(dy)) >= 20) {
      if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 2 : 0);
      else move(dy > 0 ? 3 : 1);
    }
    touch = null;
  });

  init(); // populate the board behind the start overlay
</script>
</body>
</html>
