<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: "Segoe UI", system-ui, sans-serif;
    gap: 16px;
  }
  h1 { margin: 0; letter-spacing: 2px; color: #4ade80; }
  #scoreboard {
    display: flex;
    gap: 32px;
    font-size: 18px;
  }
  #scoreboard b { color: #4ade80; }
  canvas {
    background: #16213e;
    border: 2px solid #0f3460;
    border-radius: 8px;
    touch-action: none;
  }
  #overlay {
    position: relative;
  }
  #message {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(22, 33, 62, 0.85);
    border-radius: 8px;
    text-align: center;
    gap: 12px;
  }
  #message.show { display: flex; }
  #message h2 { margin: 0; color: #f87171; }
  button {
    background: #4ade80;
    color: #16213e;
    border: none;
    padding: 10px 22px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 6px;
    cursor: pointer;
  }
  button:hover { background: #22c55e; }
  #hint { font-size: 13px; color: #94a3b8; }
</style>
</head>
<body>
  <h1>SNAKE</h1>
  <div id="scoreboard">
    <span>Score: <b id="score">0</b></span>
    <span>Best: <b id="best">0</b></span>
  </div>
  <div id="overlay">
    <canvas id="game" width="400" height="400"></canvas>
    <div id="message">
      <h2 id="message-title">Game Over</h2>
      <button id="restart">Play Again</button>
    </div>
  </div>
  <div id="hint">Use arrow keys or WASD to move. Press Space to pause.</div>

<script>
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const bestEl = document.getElementById("best");
  const messageEl = document.getElementById("message");
  const messageTitle = document.getElementById("message-title");
  const restartBtn = document.getElementById("restart");

  const GRID = 20;                 // number of cells per row/column
  const CELL = canvas.width / GRID; // pixel size of a cell

  let snake, dir, nextDir, food, score, best, paused, gameOver, loopId;

  best = Number(localStorage.getItem("snakeBest") || 0);
  bestEl.textContent = best;

  function init() {
    snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    paused = false;
    gameOver = false;
    scoreEl.textContent = score;
    placeFood();
    messageEl.classList.remove("show");
    clearInterval(loopId);
    loopId = setInterval(tick, 110);
  }

  function placeFood() {
    while (true) {
      const candidate = {
        x: Math.floor(Math.random() * GRID),
        y: Math.floor(Math.random() * GRID),
      };
      if (!snake.some(s => s.x === candidate.x && s.y === candidate.y)) {
        food = candidate;
        return;
      }
    }
  }

  function tick() {
    if (paused || gameOver) return;

    dir = nextDir;
    // wrap around the walls: exiting one edge re-enters the opposite edge
    const head = {
      x: (snake[0].x + dir.x + GRID) % GRID,
      y: (snake[0].y + dir.y + GRID) % GRID,
    };

    // self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      return end();
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      if (score > best) {
        best = score;
        bestEl.textContent = best;
        localStorage.setItem("snakeBest", best);
      }
      placeFood();
    } else {
      snake.pop();
    }

    draw();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // food
    ctx.fillStyle = "#f87171";
    drawCell(food.x, food.y);

    // snake
    snake.forEach((seg, i) => {
      ctx.fillStyle = i === 0 ? "#4ade80" : "#22c55e";
      drawCell(seg.x, seg.y);
    });
  }

  function drawCell(x, y) {
    ctx.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2);
  }

  function end() {
    gameOver = true;
    clearInterval(loopId);
    messageTitle.textContent = "Game Over — Score: " + score;
    restartBtn.textContent = "Play Again";
    messageEl.classList.add("show");
  }

  function setDir(x, y) {
    // prevent reversing directly into the snake's body
    if (x === -dir.x && y === -dir.y) return;
    nextDir = { x, y };
  }

  document.addEventListener("keydown", e => {
    switch (e.key) {
      case "ArrowUp": case "w": case "W": setDir(0, -1); break;
      case "ArrowDown": case "s": case "S": setDir(0, 1); break;
      case "ArrowLeft": case "a": case "A": setDir(-1, 0); break;
      case "ArrowRight": case "d": case "D": setDir(1, 0); break;
      case " ":
        if (!gameOver) paused = !paused;
        break;
    }
    if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)) {
      e.preventDefault();
    }
  });

  // basic touch / swipe support
  let touchStart = null;
  canvas.addEventListener("touchstart", e => {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  });
  canvas.addEventListener("touchend", e => {
    if (!touchStart) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    if (Math.abs(dx) > Math.abs(dy)) {
      setDir(dx > 0 ? 1 : -1, 0);
    } else {
      setDir(0, dy > 0 ? 1 : -1);
    }
    touchStart = null;
  });

  restartBtn.addEventListener("click", init);

  // Show the start screen instead of auto-starting the game.
  messageTitle.textContent = "🐍 SNAKE";
  restartBtn.textContent = "Start";
  messageEl.classList.add("show");
</script>
</body>
</html>
