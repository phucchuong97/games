<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Games</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: "Segoe UI", system-ui, sans-serif;
    gap: 32px;
    padding: 24px;
  }
  h1 {
    margin: 0;
    font-size: clamp(28px, 6vw, 48px);
    letter-spacing: 3px;
    color: #4ade80;
  }
  p.sub { margin: 0; color: #94a3b8; }
  .cards {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    justify-content: center;
  }
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 200px;
    height: 200px;
    background: #16213e;
    border: 2px solid #0f3460;
    border-radius: 16px;
    text-decoration: none;
    color: #e0e0e0;
    transition: transform 0.15s, border-color 0.15s;
  }
  .card:hover {
    transform: translateY(-6px);
    border-color: #4ade80;
  }
  .card .emoji { font-size: 64px; line-height: 1; }
  .card .name { font-size: 22px; font-weight: bold; letter-spacing: 1px; }
  .card .desc { font-size: 13px; color: #94a3b8; }
  footer { font-size: 12px; color: #64748b; }
</style>
</head>
<body>
  <h1>MINI GAMES</h1>
  <p class="sub">Pick a game to play</p>
  <div class="cards">
    <a class="card" href="games/snake.html">
      <span class="emoji">🐍</span>
      <span class="name">Snake</span>
      <span class="desc">Classic arcade snake</span>
    </a>
    <a class="card" href="games/caro.html">
      <span class="emoji">⭕</span>
      <span class="name">Caro</span>
      <span class="desc">Five-in-a-row vs computer</span>
    </a>
    <a class="card" href="games/2048.html">
      <span class="emoji">🔢</span>
      <span class="name">2048</span>
      <span class="desc">Slide & merge tiles</span>
    </a>
    <a class="card" href="games/breakout.html">
      <span class="emoji">🧱</span>
      <span class="name">Breakout</span>
      <span class="desc">Smash all the bricks</span>
    </a>
    <a class="card" href="games/tictactoe.html">
      <span class="emoji">⨯</span>
      <span class="name">Tic-Tac-Toe</span>
      <span class="desc">Three-in-a-row vs computer</span>
    </a>
    <a class="card" href="games/oanquan.html">
      <span class="emoji">🪨</span>
      <span class="name">Ô Ăn Quan</span>
      <span class="desc">Vietnamese mandarin square</span>
    </a>
  </div>
  <footer>Built with HTML, CSS &amp; JavaScript · no install needed</footer>
</body>
</html>
